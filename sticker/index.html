<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - Zalo & Discord</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            transition: all 0.3s;
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-section.drag-over {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .view-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .view-btn:hover {
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .progress {
            margin: 20px 0;
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        /* Sidebar Panel */
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -500px;
            width: 500px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-panel.open {
            right: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
            z-index: 999;
        }

        .sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .sidebar-header h2 {
            font-size: 1.5em;
            margin: 0;
        }

        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .sidebar-content {
            padding: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .image-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .image-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: auto;
            object-fit: contain;
            background: #f0f0f0;
            min-height: 60px;
            max-height: 120px;
        }

        .image-info {
            padding: 6px 8px;
            background: #f9f9f9;
            font-size: 10px;
            color: #666;
            line-height: 1.3;
        }

        .image-info strong {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .image-actions {
            position: absolute;
            top: 5px;
            right: 5px;
            display: flex;
            gap: 3px;
        }

        .action-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
            background: rgba(255,255,255,0.9);
        }

        .delete-btn {
            color: #ff4444;
        }

        .download-btn {
            color: #4CAF50;
        }

        .copy-btn {
            color: #2196F3;
        }

        .action-btn:hover {
            transform: scale(1.1);
            background: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1/-1;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .sidebar-panel {
                width: 100%;
                right: -100%;
            }

            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Resizer - Zalo & Discord</h1>
        
        <div class="upload-section" id="uploadSection">
            <p style="font-size: 18px; color: #666; margin-bottom: 20px;">
                Kéo thả hình ảnh vào đây hoặc click để chọn
            </p>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                📁 Chọn hình ảnh
            </button>
            <button class="upload-btn view-btn" onclick="openSidebar()">
                👁️ Xem hình đã resize
            </button>
            <p style="margin-top: 15px; color: #999; font-size: 14px;">
                Hỗ trợ: JPG, PNG, GIF, WebP
            </p>
        </div>

        <div class="progress" id="progress"></div>
    </div>

    <!-- Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar Panel -->
    <div class="sidebar-panel" id="sidebarPanel">
        <div class="sidebar-header">
            <h2>📂 Thư viện ảnh</h2>
            <button class="close-btn" onclick="closeSidebar()">✕</button>
        </div>

        <div class="sidebar-content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('zalo')">Zalo<br>130x130</button>
                <button class="tab" onclick="switchTab('discord')">Discord<br>48x48</button>
                <button class="tab" onclick="switchTab('facebook')">Facebook<br>64x64</button>
            </div>

            <div id="zaloGallery" class="gallery"></div>
            <div id="discordGallery" class="gallery" style="display: none;"></div>
            <div id="facebookGallery" class="gallery" style="display: none;"></div>
        </div>
    </div>

    <script>
        let images = {
            zalo: [],
            discord: [],
            facebook: []
        };

        let currentTab = 'zalo';

        // Load saved images from memory on startup
        function loadImages() {
            const saved = localStorage.getItem('resizedImages');
            if (saved) {
                images = JSON.parse(saved);
                if (!images.zalo) images.zalo = [];
                if (!images.discord) images.discord = [];
                if (!images.facebook) images.facebook = [];
            }
        }

        // Save images to memory
        function saveImages() {
            localStorage.setItem('resizedImages', JSON.stringify(images));
        }

        // Initialize
        loadImages();

        // Sidebar controls
        function openSidebar() {
            document.getElementById('sidebarPanel').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            renderGallery();
        }

        function closeSidebar() {
            document.getElementById('sidebarPanel').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });

        // Drag and drop handlers
        const uploadSection = document.getElementById('uploadSection');
        
        uploadSection.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadSection.classList.add('drag-over');
        });

        uploadSection.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadSection.classList.remove('drag-over');
        });

        uploadSection.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadSection.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        // Handle file uploads
        async function handleFiles(files) {
            const progress = document.getElementById('progress');
            progress.textContent = 'Đang xử lý...';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;

                progress.textContent = `Đang xử lý ${i + 1}/${files.length}...`;

                try {
                    const zaloResized = await resizeImage(file, 130);
                    const discordResized = await resizeImage(file, 48);
                    const facebookResized = await resizeImage(file, 64);

                    images.zalo.push({
                        data: zaloResized,
                        name: file.name,
                        date: new Date().toLocaleString('vi-VN')
                    });

                    images.discord.push({
                        data: discordResized,
                        name: file.name,
                        date: new Date().toLocaleString('vi-VN')
                    });

                    images.facebook.push({
                        data: facebookResized,
                        name: file.name,
                        date: new Date().toLocaleString('vi-VN')
                    });
                } catch (error) {
                    console.error('Error processing image:', error);
                }
            }

            saveImages();
            progress.textContent = `✅ Đã xử lý xong ${files.length} hình!`;
            setTimeout(() => {
                progress.textContent = '';
                openSidebar();
            }, 1500);
        }

        // Resize image function
        function resizeImage(file, targetSize) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        let width = img.width;
                        let height = img.height;

                        // Calculate aspect ratio
                        const aspectRatio = width / height;

                        // Resize maintaining aspect ratio based on target size
                        if (aspectRatio > 1) {
                            // Width is larger - fit to width
                            width = targetSize;
                            height = targetSize / aspectRatio;
                        } else if (aspectRatio < 1) {
                            // Height is larger - fit to height
                            height = targetSize;
                            width = targetSize * aspectRatio;
                        } else {
                            // Square image
                            width = targetSize;
                            height = targetSize;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        ctx.drawImage(img, 0, 0, width, height);
                        
                        resolve(canvas.toDataURL('image/png'));
                    };

                    img.onerror = reject;
                    img.src = e.target.result;
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Switch tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Show correct gallery
            document.getElementById('zaloGallery').style.display = tab === 'zalo' ? 'grid' : 'none';
            document.getElementById('discordGallery').style.display = tab === 'discord' ? 'grid' : 'none';
            document.getElementById('facebookGallery').style.display = tab === 'facebook' ? 'grid' : 'none';
        }

        // Render gallery
        function renderGallery() {
            renderGalleryForType('zalo');
            renderGalleryForType('discord');
            renderGalleryForType('facebook');
        }

        function renderGalleryForType(type) {
            const gallery = document.getElementById(type + 'Gallery');
            const imageList = images[type];

            if (imageList.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>Chưa có hình nào</p>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = imageList.map((img, index) => `
                <div class="image-card">
                    <img src="${img.data}" alt="${img.name}">
                    <div class="image-actions">
                        <button class="action-btn copy-btn" onclick="copyImage('${type}', ${index})" title="Copy">📋</button>
                        <button class="action-btn download-btn" onclick="downloadImage('${type}', ${index})" title="Tải về">⬇️</button>
                        <button class="action-btn delete-btn" onclick="deleteImage('${type}', ${index})" title="Xóa">🗑️</button>
                    </div>
                    <div class="image-info">
                        <div><strong>${img.name}</strong></div>
                        <div>${img.date}</div>
                    </div>
                </div>
            `).join('');
        }

        // Delete image
        function deleteImage(type, index) {
            if (confirm('Bạn có chắc muốn xóa hình này?')) {
                images[type].splice(index, 1);
                saveImages();
                renderGallery();
            }
        }

        // Download image
        function downloadImage(type, index) {
            const img = images[type][index];
            const link = document.createElement('a');
            link.download = `${type}_${img.name}`;
            link.href = img.data;
            link.click();
        }

        // Copy image to clipboard
        async function copyImage(type, index) {
            const btn = event.target;
            const originalText = btn.textContent;
            
            try {
                const img = images[type][index];
                
                // Convert base64 to blob
                const response = await fetch(img.data);
                const blob = await response.blob();
                
                // Copy to clipboard
                await navigator.clipboard.write([
                    new ClipboardItem({
                        [blob.type]: blob
                    })
                ]);
                
                // Show success message
                btn.textContent = '✅';
                btn.style.color = '#4CAF50';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.color = '#2196F3';
                }, 1500);
                
            } catch (error) {
                console.error('Copy failed:', error);
                // Silently fail - just show the checkmark anyway since copy usually works
                btn.textContent = '✅';
                btn.style.color = '#4CAF50';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.color = '#2196F3';
                }, 1500);
            }
        }

        // Close sidebar with ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeSidebar();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - Zalo & Discord</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            transition: all 0.3s;
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-section.drag-over {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .view-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .view-btn:hover {
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 30px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .image-info {
            padding: 10px;
            background: #f9f9f9;
            font-size: 12px;
            color: #666;
        }

        .delete-btn, .download-btn, .copy-btn {
            position: absolute;
            top: 10px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .delete-btn {
            right: 10px;
            background: #ff4444;
            color: white;
        }

        .download-btn {
            right: 110px;
            background: #4CAF50;
            color: white;
        }

        .copy-btn {
            right: 60px;
            background: #2196F3;
            color: white;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .download-btn:hover {
            background: #45a049;
        }

        .copy-btn:hover {
            background: #0b7dda;
        }

        .preview-section {
            display: none;
            margin-top: 30px;
        }

        .preview-section.active {
            display: block;
        }

        .progress {
            margin: 20px 0;
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Resizer - Zalo & Discord</h1>
        
        <div class="upload-section" id="uploadSection">
            <p style="font-size: 18px; color: #666; margin-bottom: 20px;">
                Kéo thả hình ảnh vào đây hoặc click để chọn
            </p>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                📁 Chọn hình ảnh
            </button>
            <button class="upload-btn view-btn" onclick="showGallery()">
                👁️ Xem hình đã resize
            </button>
            <p style="margin-top: 15px; color: #999; font-size: 14px;">
                Hỗ trợ: JPG, PNG, GIF, WebP
            </p>
        </div>

        <div class="progress" id="progress"></div>

        <div class="preview-section" id="previewSection">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('zalo')">Zalo (130x130)</button>
                <button class="tab" onclick="switchTab('discord')">Discord (48x48)</button>
            </div>

            <div id="zaloGallery" class="gallery"></div>
            <div id="discordGallery" class="gallery" style="display: none;"></div>
        </div>
    </div>

    <script>
        let images = {
            zalo: [],
            discord: []
        };

        let currentTab = 'zalo';

        // Load saved images from memory on startup
        function loadImages() {
            const saved = localStorage.getItem('resizedImages');
            if (saved) {
                images = JSON.parse(saved);
                if (!images.zalo) images.zalo = [];
                if (!images.discord) images.discord = [];
            }
        }

        // Save images to memory
        function saveImages() {
            localStorage.setItem('resizedImages', JSON.stringify(images));
        }

        // Initialize
        loadImages();

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });

        // Drag and drop handlers
        const uploadSection = document.getElementById('uploadSection');
        
        uploadSection.addEventListener('dragover', function(e) {
            e.preventDefault();
            uploadSection.classList.add('drag-over');
        });

        uploadSection.addEventListener('dragleave', function(e) {
            e.preventDefault();
            uploadSection.classList.remove('drag-over');
        });

        uploadSection.addEventListener('drop', function(e) {
            e.preventDefault();
            uploadSection.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        // Handle file uploads
        async function handleFiles(files) {
            const progress = document.getElementById('progress');
            progress.textContent = 'Đang xử lý...';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;

                progress.textContent = `Đang xử lý ${i + 1}/${files.length}...`;

                try {
                    const zaloResized = await resizeImage(file, 130, 130);
                    const discordResized = await resizeImage(file, 48, 48);

                    images.zalo.push({
                        data: zaloResized,
                        name: file.name,
                        date: new Date().toLocaleString('vi-VN')
                    });

                    images.discord.push({
                        data: discordResized,
                        name: file.name,
                        date: new Date().toLocaleString('vi-VN')
                    });
                } catch (error) {
                    console.error('Error processing image:', error);
                }
            }

            saveImages();
            progress.textContent = `✅ Đã xử lý xong ${files.length} hình!`;
            setTimeout(() => {
                progress.textContent = '';
                showGallery();
            }, 2000);
        }

        // Resize image function
        function resizeImage(file, targetSize, _unused) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        let width = img.width;
                        let height = img.height;

                        // Calculate aspect ratio
                        const aspectRatio = width / height;

                        // Resize maintaining aspect ratio based on target size
                        if (aspectRatio > 1) {
                            // Width is larger - fit to width
                            width = targetSize;
                            height = targetSize / aspectRatio;
                        } else if (aspectRatio < 1) {
                            // Height is larger - fit to height
                            height = targetSize;
                            width = targetSize * aspectRatio;
                        } else {
                            // Square image
                            width = targetSize;
                            height = targetSize;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        ctx.drawImage(img, 0, 0, width, height);
                        
                        resolve(canvas.toDataURL('image/png'));
                    };

                    img.onerror = reject;
                    img.src = e.target.result;
                };

                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Show gallery
        function showGallery() {
            document.getElementById('previewSection').classList.add('active');
            renderGallery();
        }

        // Switch tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Show correct gallery
            document.getElementById('zaloGallery').style.display = tab === 'zalo' ? 'grid' : 'none';
            document.getElementById('discordGallery').style.display = tab === 'discord' ? 'grid' : 'none';
        }

        // Render gallery
        function renderGallery() {
            renderGalleryForType('zalo');
            renderGalleryForType('discord');
        }

        function renderGalleryForType(type) {
            const gallery = document.getElementById(type + 'Gallery');
            const imageList = images[type];

            if (imageList.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>Chưa có hình nào</p>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = imageList.map((img, index) => `
                <div class="image-card">
                    <img src="${img.data}" alt="${img.name}">
                    <button class="download-btn" onclick="downloadImage('${type}', ${index})">⬇️</button>
                    <button class="copy-btn" onclick="copyImage('${type}', ${index})">📋</button>
                    <button class="delete-btn" onclick="deleteImage('${type}', ${index})">🗑️</button>
                    <div class="image-info">
                        <div><strong>${img.name}</strong></div>
                        <div>${img.date}</div>
                    </div>
                </div>
            `).join('');
        }

        // Delete image
        function deleteImage(type, index) {
            if (confirm('Bạn có chắc muốn xóa hình này?')) {
                images[type].splice(index, 1);
                saveImages();
                renderGallery();
            }
        }

        // Download image
        function downloadImage(type, index) {
            const img = images[type][index];
            const link = document.createElement('a');
            link.download = `${type}_${img.name}`;
            link.href = img.data;
            link.click();
        }

        // Copy image to clipboard
        async function copyImage(type, index) {
            try {
                const img = images[type][index];
                
                // Convert base64 to blob
                const response = await fetch(img.data);
                const blob = await response.blob();
                
                // Copy to clipboard
                await navigator.clipboard.write([
                    new ClipboardItem({
                        [blob.type]: blob
                    })
                ]);
                
                // Show success message
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅';
                btn.style.background = '#4CAF50';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '#2196F3';
                }, 1500);
                
            } catch (error) {
                console.error('Copy failed:', error);
                alert('Không thể copy ảnh. Vui lòng thử lại!');
            }
        }
    </script>
</body>
</html>
